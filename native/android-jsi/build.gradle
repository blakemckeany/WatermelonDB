apply plugin: 'com.android.library'


def DEFAULT_COMPILE_SDK_VERSION = 28
def DEFAULT_BUILD_TOOLS_VERSION = "28.0.3"
def DEFAULT_MIN_SDK_VERSION = 16
def DEFAULT_TARGET_SDK_VERSION = 28
def DEFAULT_NDK_VERSION = "20.1.5948944"

android {
    compileSdkVersion rootProject.hasProperty('compileSdkVersion') ? rootProject.compileSdkVersion : DEFAULT_COMPILE_SDK_VERSION
    buildToolsVersion rootProject.hasProperty('buildToolsVersion') ? rootProject.buildToolsVersion : DEFAULT_BUILD_TOOLS_VERSION
    ndkVersion rootProject.hasProperty('ndkVersion') ? rootProject.ndkVersion : DEFAULT_NDK_VERSION

    namespace "com.nozbe.watermelondb.jsi"

    // NOTE: The OpenSSL NDK prefab (com.android.ndk.thirdparty:openssl) is no
    // longer used. It only ships 4 KB page-aligned prebuilt .so files (OpenSSL
    // 1.1.1q, 2022) with no 16 KB release, which fails Google Play's 16 KB page
    // size requirement. libcrypto is built from source and statically linked
    // into libwatermelondb-jsi.so — see src/main/cpp/CMakeLists.txt and
    // scripts/vendor-openssl.sh. The `prefab` build feature is no longer needed.

    defaultConfig {
        minSdkVersion rootProject.hasProperty('minSdkVersion') ? rootProject.minSdkVersion : DEFAULT_MIN_SDK_VERSION
        targetSdkVersion rootProject.hasProperty('targetSdkVersion') ? rootProject.targetSdkVersion : DEFAULT_TARGET_SDK_VERSION
        versionCode 1
        versionName "1.0"
        externalNativeBuild {
            cmake {
                // SQLCipher compile-time flags. These match the iOS podspec's
                // GCC_PREPROCESSOR_DEFINITIONS so the C++ shared layer behaves
                // identically across platforms.
                cFlags '-DSQLITE_HAS_CODEC', '-DSQLITE_TEMP_STORE=2'
                cppFlags '-DSQLITE_HAS_CODEC', '-DSQLITE_TEMP_STORE=2'
                // Required on modern React Native (>= 0.71 / Hermes tooling
                // prefab): all RN-supplied native libraries are built against
                // the shared NDK C++ STL. Linking the JSI library against the
                // static STL produces:
                //   "User is using a static STL but library requires a shared
                //    STL [//ReactAndroid/hermestooling]"
                // The historical crash referenced in the previous version of
                // this comment was specific to a much older RN/NDK combo and
                // no longer reproduces.
                arguments "-DANDROID_STL=c++_shared"
            }
        }
    }
    externalNativeBuild {
        cmake {
            // version '3.10.2'
            path "src/main/cpp/CMakeLists.txt"
        }
    }

    packagingOptions {
        // This library is built against the shared NDK C++ STL (see
        // ANDROID_STL=c++_shared above), as are React Native's own libraries;
        // without this, the host app build fails with duplicate .so errors
        // when two libraries both bring their own copy.
        pickFirst '**/libc++_shared.so'
    }
}

dependencies {
    implementation fileTree(dir: 'libs', include: ['*.jar'])
    implementation 'com.facebook.react:react-native:+'

    // OpenSSL is statically linked from a from-source, 16 KB-aligned build
    // (CMakeLists.txt + third_party/openssl, built by scripts/vendor-openssl.sh)
    // instead of the 4 KB-aligned com.android.ndk.thirdparty:openssl prefab.
    // No runtime dependency needed.
}
